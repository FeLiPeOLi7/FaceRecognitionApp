<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Sistema Facial</title>

<style>

body{
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f4f4f4;
}

.container{
    background:white;
    padding:40px;
    border-radius:10px;
    text-align:center;
    width:400px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

a{
    display:block;
    margin-top:20px;
    padding:15px;
    text-decoration:none;
    color:white;
    border-radius:8px;
}

.register{
    background:#2ecc71;
}

.recognize{
    background:#3498db;
}

a:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h1>Reconhecimento Facial</h1>

<p>Escolha uma opção:</p>

<a class="register"
   href="/register">

    Registrar Face

</a>

<a class="recognize"
   href="/recognize">

    Reconhecer Face

</a>

</div>

</body>
</html>
